<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Quest Notice Overlay</title>
  <style>
    :root {
      --ink: #3b2818;
      --paper: #f8ecd0;
      --edge: #8b5f33;
      --accent: #d89a1f;
      --green: #3db760;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: color-mix(in oklab, black, transparent 42%);
      font-family: "Hiragino Sans GB", sans-serif;
    }

    .panel {
      width: min(86vw, 620px);
      max-height: min(72vh, 520px);
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 28px;
      border: 4px solid var(--edge);
      border-radius: 24px;
      background: var(--paper);
      color: var(--ink);
    }

    .notice-head {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .notice-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(28px, 4vw, 40px);
    }

    .notice-subtitle {
      color: #79614b;
      font-size: 15px;
    }

    .quest-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 18px;
      border: 2px solid var(--edge);
      border-radius: 18px;
      background: color-mix(in oklab, white, transparent 20%);
    }

    .quest-name {
      color: var(--ink);
      font-size: 26px;
    }

    .quest-desc {
      color: #79614b;
      font-size: 15px;
    }

    .reward-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: color-mix(in oklab, var(--accent), transparent 82%);
    }

    .reward-label {
      color: #79614b;
      font-size: 14px;
    }

    .reward-value {
      color: var(--accent);
      font-size: 28px;
    }

    .notice-actions {
      display: flex;
      gap: 14px;
      justify-content: flex-end;
    }

    .secondary-btn,
    .primary-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 128px;
      height: 52px;
      border-radius: 999px;
      font-size: 20px;
      color: white;
      border: 0;
    }

    .secondary-btn {
      background: #8b5f33;
    }

    .primary-btn {
      background: var(--green);
    }

    .secondary-btn:active,
    .primary-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div class="overlay">
    <section class="panel">
      <header class="notice-head">
        <h1 class="notice-title">新的委托</h1>
        <div class="notice-subtitle">村长正在寻找可靠的冒险者。</div>
      </header>

      <article class="quest-card">
        <div class="quest-name">修复东桥</div>
        <div class="quest-desc">收集木材并协助工匠修复通往果园的旧桥。</div>
        <div class="reward-row">
          <span class="reward-label">完成奖励</span>
          <span class="reward-value">+240 金币</span>
        </div>
      </article>

      <div class="notice-actions">
        <button class="secondary-btn" data-action="dismiss_notice">稍后</button>
        <button class="primary-btn" data-action="accept_quest">接受</button>
      </div>
    </section>
  </div>
  <p class="visually-hidden">OpenDesign export marker</p>
</body>
</html>
