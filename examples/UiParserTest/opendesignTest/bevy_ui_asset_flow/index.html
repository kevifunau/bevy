<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bevy UI Asset Flow</title>
<style>
:root {
  --bg: #111111;
  --surface: #1c1c1c;
  --fg: #ffffff;
  --muted: #888888;
  --border: #333333;
  --accent: #f97316;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--fg);
}

.bevy-ui-root {
  display: flex;
  width: 100%;
  height: 100vh;
  position: relative;
  justify-content: center;
  align-items: center;
  background-color: var(--bg);
}

.settings-panel {
  display: flex;
  flex-direction: column;
  width: 420px;
  gap: var(--space-4);
  padding: 28px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background-color: rgba(28, 28, 28, 0.85);
}

.settings-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-size: 24px;
  font-weight: 700;
}

.close-btn {
  display: flex;
  width: 40px;
  height: 40px;
  justify-content: center;
  align-items: center;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background-color: rgba(0, 0, 0, 0.15);
}

.loading-row {
  display: flex;
  gap: var(--space-3);
  align-items: center;
}

.spinner-shell {
  display: flex;
  width: 72px;
  height: 72px;
  justify-content: center;
  align-items: center;
  border-radius: var(--radius-md);
  background-color: rgba(255, 255, 255, 0.04);
}

.icon-row {
  display: flex;
  gap: var(--space-3);
  align-items: center;
}

.skill-icon {
  display: flex;
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  background-color: rgba(255, 255, 255, 0.04);
}
</style>
</head>
<body>
<div class="bevy-ui-root">
  <div class="settings-panel" id="settings_panel">
    <div class="settings-header">
      <div class="title">Asset-First Settings</div>
      <div class="close-btn" id="close_btn" data-action="close_asset_panel">X</div>
    </div>
    <div class="loading-row">
      <div class="spinner-shell">
        <div id="loading_spinner"></div>
      </div>
      <div>Atlas-driven loading indicator</div>
    </div>
    <div class="icon-row">
      <div class="skill-icon" id="skill_icon" data-skill="fireball" aria-label="Fireball"></div>
      <div>Semantic icon resolved from manifest</div>
    </div>
  </div>
</div>
</body>
</html>
