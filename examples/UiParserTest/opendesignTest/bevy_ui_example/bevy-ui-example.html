<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bevy UI Example — Game HUD + Settings Menu</title>
<style>
/*
 * Bevy UI Example — ALL P0 Native CSS only.
 * No P1 HelperLayer, No P2 Approximation, No Forbidden properties.
 *
 * Demonstrates:
 *   - Game HUD overlay (position: fixed)
 *   - Health bar (progress binding)
 *   - Ammo counter (text readout)
 *   - Skill buttons (data-action)
 *   - Settings menu panel with tabs (data-tab)
 */

:root {
  /* ── Surface (Background) ── */
  --bg:                  #111111;
  --surface:             #1c1c1c;
  --surface-warm:        var(--surface);

  /* ── Foreground ── */
  --fg:                  #ffffff;
  --fg-2:                var(--fg);
  --muted:               #888888;
  --meta:                var(--muted);

  /* ── Border ── */
  --border:              #333333;
  --border-soft:         var(--border);

  /* ── Accent (Interactive) ── */
  --accent:              #f97316;
  --accent-on:           #000000;
  --accent-hover:        #e8790e;
  --accent-active:       #d97006;

  /* ── Semantic ── */
  --success:             #22c55e;
  --warn:                #fbbf24;
  --danger:              #ef4444;

  /* ── Font Families ── */
  --font-display:        "Inter", "Helvetica", "Arial", sans-serif;
  --font-body:           "Inter", "Helvetica", "Arial", sans-serif;
  --font-mono:           ui-monospace, "Menlo", "Monaco", "Courier", monospace;

  /* ── Type Scale ── */
  --text-2xs:            10px;
  --text-xs:             12px;
  --text-sm:             14px;
  --text-base:           16px;
  --text-lg:             18px;
  --text-xl:             20px;
  --text-2xl:            24px;
  --text-3xl:            36px;
  --text-4xl:            48px;

  /* ── Leading & Tracking ── */
  --leading-body:        1.4;
  --leading-tight:       1.0;
  --tracking-display:    0;

  /* ── Spacing ── */
  --space-1:             4px;
  --space-2:             8px;
  --space-3:             12px;
  --space-4:             16px;
  --space-5:             20px;
  --space-6:             24px;
  --space-8:             32px;
  --space-10:            40px;
  --space-12:            48px;

  /* ── Section Vertical Padding (Responsive) ── */
  --section-y-desktop:   48px;
  --section-y-tablet:    32px;
  --section-y-phone:     24px;

  /* ── Radius ── */
  --radius-sm:           6px;
  --radius-md:           8px;
  --radius-lg:           12px;
  --radius-pill:         9999px;

  /* ── Elevation (NO blur shadow — Bevy UI renders ring outlines only) ── */
  --elev-flat:           none;
  --elev-ring:           0 0 0 1px var(--border);
  --elev-raised:         0 0 0 1px var(--border);

  /* ── Focus (NO blur shadow — ring outline only) ── */
  --focus-ring:          0 0 0 2px var(--accent);

  /* ── Motion (ECS-driven, not CSS animation) ── */
  --motion-fast:         150ms;
  --motion-base:         200ms;
  --ease-standard:       cubic-bezier(0.2, 0, 0, 1);

  /* ── Layout ── */
  --container-max:                1920px;
  --container-gutter-desktop:     24px;
  --container-gutter-tablet:      16px;
  --container-gutter-phone:       12px;
}

*, *::before, *::after {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background-color: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: var(--leading-body);
  width: 100%;
  height: 100%;
}

.bevy-ui-root {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100vh;
  position: relative;
}

/* ════════════════════════════════════
   HUD OVERLAY — position: fixed
   ════════════════════════════════════ */

.hud-overlay {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: flex-end;
  padding: var(--space-4);
  z-index: 10;
}

.hud-left {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.hud-right {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  align-items: flex-end;
}

/* ── Health Bar ── */

.health-bar {
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  aria-label: "Health";
}

.health-bar-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--fg);
  letter-spacing: var(--tracking-display);
  line-height: var(--leading-tight);
}

.health-bar-track {
  display: flex;
  flex-direction: row;
  width: 200px;
  height: 12px;
  background-color: var(--border);
  border-radius: var(--radius-pill);
  overflow: hidden;
}

.health-bar-fill {
  display: flex;
  width: 75%;
  height: 100%;
  background-color: var(--success);
  border-radius: var(--radius-pill);
}

.health-bar-fill.critical {
  background-color: var(--danger);
}

/* ── Ammo Counter ── */

.ammo-counter {
  display: flex;
  flex-direction: row;
  gap: var(--space-2);
  align-items: center;
  background-color: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-2) var(--space-3);
}

.ammo-counter-icon {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--accent);
  line-height: var(--leading-tight);
}

.ammo-counter-value {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-weight: 400;
  color: var(--fg);
  line-height: var(--leading-body);
}

/* ── Skill Buttons ── */

.skill-bar {
  display: flex;
  flex-direction: row;
  gap: var(--space-3);
  align-items: center;
}

.skill-btn {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 48px;
  height: 48px;
  background-color: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--fg);
  line-height: var(--leading-tight);
  aspect-ratio: 1;
}

.skill-btn:hover {
  background-color: var(--accent);
  color: var(--accent-on);
  border-color: var(--accent);
}

.skill-btn:active {
  background-color: var(--accent-active);
  border-color: var(--accent-active);
}

.skill-btn:focus-visible {
  border-color: var(--accent);
}

.skill-btn.disabled {
  opacity: 0.5;
  color: var(--muted);
}

.skill-btn.disabled:hover {
  background-color: var(--surface);
  color: var(--muted);
  border-color: var(--border);
}

.skill-btn.disabled:focus-visible {
  border-color: var(--muted);
}

/* ════════════════════════════════════
   SETTINGS MENU PANEL
   ════════════════════════════════════ */

.settings-panel {
  display: flex;
  flex-direction: column;
  background-color: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 480px;
  max-height: 80vh;
  overflow: hidden;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
}

.settings-panel-header {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-4);
  border-bottom: 1px solid var(--border);
}

.settings-panel-title {
  font-size: var(--text-2xl);
  font-weight: 600;
  color: var(--fg);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-display);
}

.close-btn {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 32px;
  height: 32px;
  background-color: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--muted);
  line-height: var(--leading-tight);
}

.close-btn:hover {
  background-color: var(--danger);
  color: var(--fg);
  border-color: var(--danger);
}

.close-btn:active {
  background-color: #cc3333;
  border-color: #cc3333;
}

.close-btn:focus-visible {
  border-color: var(--accent);
}

/* ── Tab Navigation ── */

.tab-bar {
  display: flex;
  flex-direction: row;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.tab-item {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--muted);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-display);
  border-bottom: 2px solid transparent;
}

.tab-item:hover {
  color: var(--fg);
  border-bottom: 2px solid var(--accent-hover);
}

.tab-item.active {
  color: var(--fg);
  border-bottom: 2px solid var(--accent);
}

.tab-item:focus-visible {
  border-color: var(--accent);
}

/* ── Tab Panel Content ── */

.tab-content {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  padding: var(--space-4);
  overflow-y: auto;
}

.tab-panel {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

.settings-row {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-2) 0;
  border-bottom: 1px solid var(--border-soft);
}

.settings-row:last-child {
  border-bottom: none;
}

.settings-row-label {
  font-size: var(--text-base);
  font-weight: 400;
  color: var(--fg);
  line-height: var(--leading-body);
}

.settings-row-value {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-weight: 400;
  color: var(--muted);
  line-height: var(--leading-body);
}

.toggle-btn {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 48px;
  height: 24px;
  background-color: var(--border);
  border-radius: var(--radius-pill);
  border: none;
  color: transparent;
  font-size: var(--text-2xs);
  line-height: var(--leading-tight);
}

.toggle-btn.on {
  background-color: var(--accent);
}

.toggle-btn:focus-visible {
  border: 2px solid var(--accent);
}

.slider-track {
  display: flex;
  flex-direction: row;
  width: 120px;
  height: 6px;
  background-color: var(--border);
  border-radius: var(--radius-pill);
  overflow: hidden;
}

.slider-fill {
  display: flex;
  width: 70%;
  height: 100%;
  background-color: var(--accent);
  border-radius: var(--radius-pill);
}
</style>
</head>
<body>
<div class="bevy-ui-root">

  <!-- ══════════════════════════════════
       HUD OVERLAY (bottom of screen)
       ══════════════════════════════════ -->
  <div class="hud-overlay">
    <div class="hud-left">
      <!-- Health Bar -->
      <div class="health-bar" aria-label="Health">
        <div class="health-bar-label">HP 75/100</div>
        <div class="health-bar-track">
          <div class="health-bar-fill"></div>
        </div>
      </div>

      <!-- Ammo Counter -->
      <div class="ammo-counter">
        <div class="ammo-counter-icon">AMMO</div>
        <div class="ammo-counter-value">24 / 30</div>
      </div>
    </div>

    <div class="hud-right">
      <!-- Skill Bar — 5 skill buttons -->
      <div class="skill-bar">
        <div class="skill-btn" data-action="cast_fireball" data-skill="fireball" aria-label="Fireball">1</div>
        <div class="skill-btn" data-action="cast_shield" data-skill="shield" aria-label="Shield">2</div>
        <div class="skill-btn" data-action="cast_heal" data-skill="heal" aria-label="Heal">3</div>
        <div class="skill-btn" data-action="cast_dash" data-skill="dash" aria-label="Dash">4</div>
        <div class="skill-btn disabled" data-action="cast_ult" data-skill="ult" aria-label="Ultimate">5</div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       SETTINGS MENU PANEL (centered)
       ══════════════════════════════════ -->
  <div class="settings-panel">
    <!-- Header with close button -->
    <div class="settings-panel-header">
      <div class="settings-panel-title">Settings</div>
      <div class="close-btn" data-action="close_settings" aria-label="Close settings">X</div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-bar">
      <div class="tab-item active" data-tab="graphics" data-tab-group="settings">Graphics</div>
      <div class="tab-item" data-tab="audio" data-tab-group="settings">Audio</div>
      <div class="tab-item" data-tab="controls" data-tab-group="settings">Controls</div>
    </div>

    <!-- Tab Content -->
    <div class="tab-content">
      <!-- Graphics Tab Panel -->
      <div class="tab-panel" data-tab-panel="graphics">
        <div class="settings-row">
          <div class="settings-row-label">Resolution</div>
          <div class="settings-row-value">1920x1080</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Fullscreen</div>
          <div class="toggle-btn on" data-action="toggle_fullscreen" aria-label="Toggle fullscreen">ON</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Render Quality</div>
          <div class="slider-track">
            <div class="slider-fill"></div>
          </div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Anti-Aliasing</div>
          <div class="toggle-btn on" data-action="toggle_aa" aria-label="Toggle anti-aliasing">ON</div>
        </div>
      </div>

      <!-- Audio Tab Panel (hidden by default) -->
      <div class="tab-panel" data-tab-panel="audio" style="display: none;">
        <div class="settings-row">
          <div class="settings-row-label">Master Volume</div>
          <div class="slider-track">
            <div class="slider-fill" style="width: 80%;"></div>
          </div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Music Volume</div>
          <div class="slider-track">
            <div class="slider-fill" style="width: 60%;"></div>
          </div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">SFX Volume</div>
          <div class="slider-track">
            <div class="slider-fill" style="width: 90%;"></div>
          </div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Mute</div>
          <div class="toggle-btn" data-action="toggle_mute" aria-label="Toggle mute">OFF</div>
        </div>
      </div>

      <!-- Controls Tab Panel (hidden by default) -->
      <div class="tab-panel" data-tab-panel="controls" style="display: none;">
        <div class="settings-row">
          <div class="settings-row-label">Move Forward</div>
          <div class="settings-row-value">W</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Move Back</div>
          <div class="settings-row-value">S</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Move Left</div>
          <div class="settings-row-value">A</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Move Right</div>
          <div class="settings-row-value">D</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Interact</div>
          <div class="settings-row-value">E</div>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
